<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Market Analyzer - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.1/dist/chartjs-chart-financial.min.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="dashboard" id="dashboard">
        <div class="header">
            <h1>📈 Currency Market Analyzer</h1>
            <div class="header-controls">
                <div class="user-info" id="userInfo">Logged in as: —</div>
                <div class="status-indicator">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Monitoring Inactive</span>
                </div>
                <button class="btn-success" id="startBtn" onclick="startMonitoring()">Start Monitoring</button>
                <button class="btn-danger" id="stopBtn" onclick="stopMonitoring()" style="display:none;">Stop Monitoring</button>
                <button class="btn-danger" onclick="handleLogout()">Logout</button>
            </div>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchPage('overview', event)">Overview</button>
            <button class="nav-tab" onclick="switchPage('alerts', event)">Alert History</button>
            <button class="nav-tab" onclick="switchPage('manage', event)">Manage Alerts</button>
            <button class="nav-tab" onclick="switchPage('backtest', event)">Backtest</button>
            <button class="nav-tab" onclick="switchPage('trade', event); initTradePage();">Trade</button>
            <button class="nav-tab" onclick="switchPage('forecast', event); loadLatestForecast();">Forecast</button>
            <button class="nav-tab" onclick="switchPage('deepLearning', event)">Deep Learning</button>
            <button class="nav-tab" onclick="switchPage('settings', event)">Settings</button>
        </div>

        <div id="pagesContainer"></div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="/static/utils.js?v=20260125"></script>
    <script src="/static/auth.js?v=20260125"></script>
    <script src="/static/dashboard.js?v=20260125"></script>
    <script src="/static/pages/overview.js"></script>
    <script src="/static/pages/alerts.js"></script>
    <script src="/static/pages/manage.js"></script>
    <script src="/static/pages/trade.js"></script>
    <script src="/static/pages/forecast.js"></script>
    <script src="/static/pages/deep_learning.js"></script>
    <script src="/static/pages/settings.js"></script>
</body>
</html>
